<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Interactive Map</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="header-with-logout">
        <h1>Interactive map</h1>
        <button class="btn btn-logout" onclick="logout()">
            Log out
        </button>
    </div>

    <div class="container-dashboard">

        <!-- MAPS -->
        <div class="dashboard-section">
            <h2>Your maps</h2>

            <!-- сюда JS будет добавлять карты -->
            <div class="map-list" id="mapList"></div>

            <!-- кнопка создания -->
            <button class="map-item create-item" onclick="createNewMap()">
                + Create new map
            </button>
        </div>

        <!-- GROUPS -->
        <div class="dashboard-section">
            <h2>Your groups</h2>

            <div class="map-list" id="groupList"></div>

<button
    class="map-item create-item"
    onclick="showCreateGroupModal()"
>
    + Create new group
</button>

<button
    class="map-item create-item"
    onclick="showJoinGroupModal()"
>
    + Join group
</button>
        </div>

    </div>

    <script src="script.js"></script>



</body>
</html>
