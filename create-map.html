<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Individual Map - Interactive Map</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header-with-logout">
        <h1>Interactive map</h1>
        <button class="btn btn-logout" onclick="logout()">Log out</button>
    </div>
    <div class="container">
        <div class="auth-card">
            <h2>Create individual map</h2>
            <form id="createMapForm">
                <input type="text" placeholder="Map name" required>
                <button type="submit" class="btn btn-success btn-full">Create</button>
            </form>
            <button class="btn btn-secondary btn-full" onclick="history.back()">Back</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
